<!DOCTYPE html>
<html>
<head>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
margin:0;
padding:10px;
}

.chart-container{
width:100%;
max-width:900px;
margin:auto;
}
</style>

</head>

<body>

<h3 style="text-align:center;">Department-wise Student Data (Academic Year)</h3>

<div class="chart-container">
<canvas id="deptChart"></canvas>
</div>

<script>

const ctx = document.getElementById('deptChart');

new Chart(ctx, {

type:'bar',

data:{

labels:['2022-23','2023-24','2024-25','2025-26'],

datasets:[

{
label:'ETC',
data:[13,38,23,89]
},

{
label:'CSE',
data:[24,20,40,123]
},

{
label:'AIML',
data:[null,17,10,117]
},

{
label:'AIDS',
data:[null,null,15,41]
},

{
label:'Electrical',
data:[1,21,32,76]
},

{
label:'Civil',
data:[null,9,18,12]
},

{
label:'Mechanical',
data:[13,23,18,46]
}

]

},

options:{
responsive:true,
plugins:{
legend:{
position:'top'
}
},
scales:{
y:{
beginAtZero:true
}
}
}

});

</script>

</body>
</html>
